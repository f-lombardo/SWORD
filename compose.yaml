services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - mailpit
    scheduler:
        image: 'sail-8.5/app'
        command: 'php artisan schedule:work'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    adminer:
        image: 'adminer:latest'
        ports:
            - '${FORWARD_ADMINER_PORT:-8080}:8080'
        networks:
            - sail
        depends_on:
            - mysql
    cloudflared:
        image: 'cloudflare/cloudflared:latest'
        command: 'tunnel --protocol http2 --metrics 0.0.0.0:2000 --no-autoupdate --url http://laravel.test:80'
        ports:
            - '${FORWARD_CLOUDFLARED_METRICS_PORT:-2000}:2000'
        networks:
            - sail
        depends_on:
            - laravel.test
    netdata:
        image: netdata/netdata:stable
        container_name: netdata-sail
        hostname: netdata-sail
        ports:
            - '19999:19999'
        cap_add:
            - SYS_PTRACE
            - SYS_ADMIN
        security_opt:
            - apparmor:unconfined
        volumes:
            - 'netdataconfig:/etc/netdata'
            - 'netdatalib:/var/lib/netdata'
            - 'netdatacache:/var/cache/netdata'
            - '/etc/passwd:/host/etc/passwd:ro'
            - '/etc/group:/host/etc/group:ro'
            - '/proc:/host/proc:ro'
            - '/sys:/host/sys:ro'
            - '/etc/os-release:/host/etc/os-release:ro'
            - '/var/run/docker.sock:/var/run/docker.sock:ro'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
    netdataconfig:
    netdatalib:
    netdatacache:
